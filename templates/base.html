<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Exam Portal{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f6f8; margin:0; }
    .wrap { max-width: 780px; margin: 44px auto; padding: 0 14px; }
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom: 14px;
    }
    .brand { font-size: 18px; font-weight: 800; color:#1f6feb; }
    .user { font-size: 13px; color:#555; }
    .card {
      background:#fff; border-radius: 16px; padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1,h2 { margin: 0 0 10px; }
    .sub { color:#666; margin: 0 0 18px; font-size: 14px; }
    label { display:block; margin: 14px 0 6px; font-weight: 700; color:#333; }
    select, input {
      width:100%; padding:10px 12px; border:1px solid #cfd6dd;
      border-radius: 10px; font-size: 14px; outline:none; background:#fff;
      box-sizing: border-box;
    }
    .row { margin-bottom: 10px; }
    .btnrow { display:flex; gap:10px; margin-top:18px; align-items:center; flex-wrap: wrap; }
    button, .btn {
      padding:10px 14px; border:none; border-radius:10px; font-weight:800;
      cursor:pointer; display:inline-block; text-decoration:none;
    }
    .primary { background:#1f6feb; color:#fff; }
    .secondary { background:#e9eef5; color:#234; }
    .danger { background:#ffe7e7; color:#8a0000; }
    button:disabled { background:#9bbcf5; cursor:not-allowed; }
    .pill { font-size:12px; padding:6px 10px; border-radius:999px; background:#eef6ff; color:#1f6feb; font-weight:800; }
    .hint { margin-top: 12px; color:#777; font-size: 12px; }
    .qbox { margin-top: 12px; padding: 14px; background:#f7f9fc; border:1px solid #e6edf5; border-radius: 12px; }
    .choice { display:block; margin: 8px 0; }
    .choice input { width:auto; margin-right: 8px; }
    .status-ok { color:#0a7b34; font-weight:800; }
    .status-bad { color:#b00020; font-weight:800; }
    ul { padding-left: 18px; }
    .footerlinks { margin-top: 14px; font-size: 13px; color:#666; }
    .footerlinks a { color:#1f6feb; text-decoration:none; font-weight:700; }

    /* makes the logout button look like a link */
    .linklike {
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      color: #1f6feb;
      font-weight: 700;
      cursor: pointer;
      text-decoration: underline;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">Exam Portal</div>
      <div class="user">
        {% if user.is_authenticated %}
          {{ user.username }} ·
          <form method="post" action="/accounts/logout/" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="linklike">Logout</button>
          </form>
        {% else %}
          <a href="/accounts/login/">Login</a>
        {% endif %}
      </div>
    </div>

    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
